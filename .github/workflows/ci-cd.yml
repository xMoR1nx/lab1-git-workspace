name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest        # 1. Середовище виконання — Ubuntu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js        # 2. Налаштування Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies # 3. Встановлення залежностей
        run: npm ci

      - name: Run linter           # 4. Перевірка якості коду
        run: npm run lint

      - name: Run unit tests       # 5. Запуск тестів
        run: npm run test -- --run
        continue-on-error: false

      - name: Build for production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/